version: '3.9'

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: cpm-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cpm-network

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: cpm-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cpm-network

networks:
  cpm-network:
    driver: bridge
